<!DOCTYPE html>
<html lang="en">

<head>
    <title>The Tolucan Times</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

    <link type="text/css" rel="stylesheet" href="./css/style.css">
    <link type="text/css" rel="stylesheet" href="./css/nav.css">
    <link type="text/css" rel="stylesheet" href="./css/swiper.css">
    <link type="text/css" rel="stylesheet" href="./css/frontpage.css">
    <link type="text/css" rel="stylesheet" href="./css/weather.css">
    <link type="text/css" rel="stylesheet" href="./css/footer.css">
    <link type="text/css" rel="stylesheet" href="./css/contact.css">
    <link type="text/css" rel="stylesheet" href="./css/directory.css">

    <link rel="icon" type="image/png" href="/images/TTT_Favicon.png">

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.4.1/dist/jquery.min.js"></script>

    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne+Mono&display=swap" rel="stylesheet">

</head>

<body>

    <div class="" id="nav-ph"></div>


    

    <div class="map-intro-container">.

        <h1>Our Friends: A Toluca Lake Business Directory</h1>
        <h2>Find Out More About Toluca Lakes Wonderful Experiences!</h2>
        <h2>Want to feature your business on this website? <a href="./contactus.html">Contact us Here!</a></h2>

    </div>

    <div class="directory-container" id="directory-container">
        <p style="font-family:sans-serif;font-size:14px;color:#888;padding:20px;">Loading…</p>
    </div>

    <script>
    fetch('./data/config.json')
        .then(function(r) { return r.json(); })
        .then(function(cfg) {
            var friends = cfg.friends || [];
            var container = document.getElementById('directory-container');
            if (!friends.length) {
                container.innerHTML = '<p style="font-family:sans-serif;font-size:14px;color:#888;padding:20px;">No businesses listed yet.</p>';
                return;
            }
            container.innerHTML = friends.map(function(cat) {
                var color = cat.color || '#888';
                var imgHtml = cat.headerImage
                    ? '<div class="directory-box-img"><img src="' + cat.headerImage + '" alt="' + (cat.category || '') + '"></div>'
                    : '';
                var bizHtml = (cat.businesses || []).map(function(b) {
                    var nameHtml = (b.mapsUrl && b.mapsUrl.trim())
                        ? '<a href="' + b.mapsUrl + '" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">' + b.name + '</a>'
                        : b.name;
                    return '<li>'
                        + '<span class="business-name">' + nameHtml + '</span><br>'
                        + '<span class="business-address">' + (b.address || '') + '</span>'
                        + (b.phone ? '<span class="business-number"> ' + b.phone + '</span>' : '')
                        + '</li>';
                }).join('');
                return '<div class="directory-box" style="background-color:' + color + ';">'
                    + imgHtml
                    + '<h1 style="background-color:' + color + ';color:white;">' + (cat.category || '') + '</h1>'
                    + '<ul>' + bizHtml + '</ul>'
                    + '</div>';
            }).join('');
        })
        .catch(function() {
            document.getElementById('directory-container').innerHTML = '<p style="font-family:sans-serif;font-size:14px;color:#c54a2b;padding:20px;">Error loading directory.</p>';
        });
    </script>

    <div class="map-container" style="overflow:hidden;">
        <iframe src="https://www.google.com/maps/d/embed?mid=1ga4h3L96mmjKg3msGGN2JbTT1SgYHGE&ehbc=2E312F&noprof=1"
            width="100%" height="100%" style="border: none; position:relative; top:-70px;" allow=""></iframe>
    </div>
    

    <div class="" id="footer-ph"></div>


    <script type="text/javascript" src="./partloader.js"></script>




</body>

</html>
