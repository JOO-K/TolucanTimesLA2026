<div class="publications-outer">

<div class="section-divider"><span>Latest Issues</span></div>

<div class="publications-container" id="pub-cards-container">
    <!-- Filled dynamically from data/config.json -->
</div>

</div>

<script>
(function() {
    fetch('./data/config.json?_=' + Date.now())
        .then(function(r) { return r.json(); })
        .then(function(cfg) {
            var pubs = cfg.publications || [];
            var container = document.getElementById('pub-cards-container');
            if (!container) return;

            var html = '';
            pubs.forEach(function(p) {
                html += '<div class="publications-box">'
                      +   '<a href="' + p.calameoUrl + '">'
                      +     '<img src="' + p.coverImage + '" alt="' + p.title + '">'
                      +     '<h1>' + p.title + '</h1>'
                      +     (p.artist ? '<h2>Artwork By<br>' + p.artist + '</h2>' : '')
                      +   '</a>'
                      + '</div>';
            });

            // Always append the "More Issues" link at the end
            html += '<div class="publications-box">'
                  +   '<a href="https://www.calameo.com/accounts/7705413">'
                  +     '<img src="./images/covers/Cover_Plus.png" alt="More Issues">'
                  +     '<h1>More Issues &rarr;</h1>'
                  +     '<h2>Read all of our issues here</h2>'
                  +   '</a>'
                  + '</div>';

            container.innerHTML = html;
        })
        .catch(function() {
            // Fallback: leave container empty, "More Issues" link still shows
            var container = document.getElementById('pub-cards-container');
            if (container) container.innerHTML = '<div class="publications-box"><a href="https://www.calameo.com/accounts/7705413"><img src="./images/covers/Cover_Plus.png"><h1>More Issues &rarr;</h1><h2>Read all of our issues here</h2></a></div>';
        });
})();
</script>
