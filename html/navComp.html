<!-- Slogan loader — overrides date display when a custom slogan is set -->
<script>
(function () {
    fetch('./data/config.json?t=' + Date.now())
        .then(function (r) { return r.json(); })
        .then(function (cfg) {
            if (cfg.slogan && cfg.slogan.trim()) {
                window._navSlogan = cfg.slogan.trim();
                var el = document.getElementById('date');
                if (el) el.textContent = window._navSlogan;
            }
        })
        .catch(function () {});
}());
</script>

<!-- Marquee Initiate -->
<script>

    function Marquee(selector, speed) {
        const parentSelector = document.querySelector(selector);
        const clone = parentSelector.innerHTML;
        const firstElement = parentSelector.children[0];
        let i = 0;
        console.log(firstElement);
        parentSelector.insertAdjacentHTML('beforeend', clone);
        parentSelector.insertAdjacentHTML('beforeend', clone);
        parentSelector.insertAdjacentHTML('beforeend', clone);
        parentSelector.insertAdjacentHTML('beforeend', clone);

        setInterval(function () {
            firstElement.style.marginLeft = `-${i}px`;
            if (i > firstElement.clientWidth) {
                i = 0;
            }
            i = i + speed;
        }, 0);
    }

    //after window is completed load
    //1 class selector for marquee
    //2 marquee speed 0.2
    window.addEventListener('load', Marquee('.marquee', 0.15))

</script>
