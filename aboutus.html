<!DOCTYPE html>
<html lang="en">

<head>
    <title>The Tolucan Times</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

    <link type="text/css" rel="stylesheet" href="./css/style.css">
    <link type="text/css" rel="stylesheet" href="./css/nav.css">
    <link type="text/css" rel="stylesheet" href="./css/swiper.css">
    <link type="text/css" rel="stylesheet" href="./css/frontpage.css">
    <link type="text/css" rel="stylesheet" href="./css/weather.css">
    <link type="text/css" rel="stylesheet" href="./css/footer.css">
    <link type="text/css" rel="stylesheet" href="./css/aboutus.css">
    <link type="text/css" rel="stylesheet" href="./css/publications.css">

    <link rel="icon" type="image/png" href="images/TTT_Favicon.png">

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.4.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne+Mono&display=swap" rel="stylesheet">
</head>

<body>

    <div class="" id="nav-ph"></div>

    <div class="aboutus-container">

        <div class="aboutus-intro-container">
            <img src="./images/TTT_Logo.png" style="width:280px">
            <h1 id="aboutus-text"></h1>
            <img src="./images/about_us_image.JPG">
        </div>

        <div class="writer-container" id="writer-container"></div>

    </div>

    <div class="" id="footer-ph"></div>

    <script type="text/javascript" src="./partloader.js"></script>

    <script>
    fetch('./data/config.json')
        .then(function(r) { return r.json(); })
        .then(function(cfg) {
            var au = cfg.aboutUs || {};
            var textEl = document.getElementById('aboutus-text');
            if (au.text) {
                var paragraphs = au.text.split(/\n\n+/);
                textEl.innerHTML = paragraphs.map(function(p, i) {
                    if (i === 0) {
                        var cleaned = p.replace(/^The Tolucan Times\s*/i, '');
                        return '<span style="font-style:italic;font-size:25px;">The Tolucan Times</span> ' + cleaned;
                    }
                    return p;
                }).join('<br><br>');
            }
            var container = document.getElementById('writer-container');
            container.innerHTML = (au.staff || []).map(function(s) {
                return '<div class="writer-box">'
                    + '<h1>' + (s.name || '') + '</h1>'
                    + '<h2>' + (s.title || '') + '</h2>'
                    + (s.bio ? '<h3>' + s.bio + '</h3>' : '')
                    + '</div>';
            }).join('');
        })
        .catch(function() {});
    </script>

</body>

</html>
