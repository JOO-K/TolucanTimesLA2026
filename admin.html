<!DOCTYPE html>
<html lang="en">
<head>
    <title>Tolucan Times — Admin</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Georgia, serif; background: #f5f0e8; color: #1a1a1a; min-height: 100vh; }

        /* ── Login ── */
        #login-screen { max-width: 420px; margin: 80px auto; padding: 40px; background: white; border: 1px solid #ddd; text-align: center; }
        #login-screen h1 { font-size: 22px; margin-bottom: 6px; letter-spacing: 1px; }

        #login-screen a { color: #1E90FF; }

        #login-error { color: #c54a2b; font-size: 12px; margin-top: 10px; font-family: sans-serif; min-height: 18px; line-height: 1.5; }

        /* ── Shell ── */
        #admin-screen { display: none; }
        .admin-header { background: #1a1a1a; color: white; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 52px; }
        .admin-header h1 { font-size: 14px; letter-spacing: 2px; font-family: sans-serif; font-weight: 700; }
        .admin-header-right { display: flex; gap: 14px; align-items: center; }

        .admin-header-right a:hover { color: white; }
        .admin-body { max-width: 880px; margin: 0 auto; padding: 28px 20px; }

        /* ── Buttons ── */

        .btn:hover { filter: brightness(0.9); }
        .btn:active { filter: brightness(0.8); }
        .btn-primary  { background: #1E90FF; color: white; }
        .btn-secondary{ background: #eee; color: #333; border: 1px solid #ccc; }
        .btn-danger   { background: #c54a2b; color: white; }
        .btn-success  { background: #2a8a2a; color: white; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }

        /* ── Section header ── */
        .section-title { font-size: 10px; font-family: sans-serif; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #666; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; }

        /* ── Article list ── */
        .article-row { background: white; border: 1px solid #ddd; padding: 14px 18px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .article-row-left { flex: 1; min-width: 0; }
        .article-row-tag { font-size: 9px; font-family: sans-serif; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #1E90FF; margin-bottom: 4px; }
        .article-row-title { font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .article-row-meta { font-size: 11px; font-family: sans-serif; color: #888; margin-top: 3px; }
        .article-row-actions { display: flex; gap: 8px; flex-shrink: 0; }

        /* ── Editor ── */
        #article-editor { display: none; background: white; border: 1px solid #ddd; padding: 30px; }
        .editor-heading { font-size: 20px; margin-bottom: 22px; padding-bottom: 14px; border-bottom: 1px dashed #ccc; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 10px; font-family: sans-serif; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #666; margin-bottom: 6px; }
        .form-group label span { font-weight: 400; text-transform: none; letter-spacing: 0; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #ccc; font-size: 14px; font-family: Georgia, serif; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: 2px solid #1E90FF; border-color: #1E90FF; }
        .form-group textarea { resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        .blocks-label { font-size: 10px; font-family: sans-serif; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #666; margin-bottom: 10px; }
        #blocks-list { margin-bottom: 14px; }

        .block-item { border: 1px solid #ddd; margin-bottom: 8px; background: #fafafa; }

        .block-type-label.image { color: #c54a2b; }
        .block-body { padding: 12px; }
        .block-body input, .block-body textarea { width: 100%; padding: 8px 10px; border: 1px solid #ccc; font-size: 13px; font-family: Georgia, serif; margin-bottom: 8px; }
        .block-body input:last-child, .block-body textarea:last-child { margin-bottom: 0; }

        .block-body input:focus, .block-body textarea:focus { outline: 2px solid #1E90FF; border-color: #1E90FF; }

        .block-add-row { display: flex; gap: 8px; flex-wrap: wrap; }

        .editor-actions { display: flex; gap: 10px; margin-top: 24px; padding-top: 20px; border-top: 1px dashed #ccc; flex-wrap: wrap; align-items: center; }
        #delete-btn { margin-left: auto; }

        /* ── Status ── */
        #status-msg { display: none; padding: 12px 18px; margin-bottom: 18px; font-family: sans-serif; font-size: 13px; line-height: 1.5; }
        #status-msg.success { background: #e8f5e8; border: 1px solid #2a8a2a; color: #1a5a1a; }
        #status-msg.error   { background: #fde8e4; border: 1px solid #c54a2b; color: #7a2010; }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
            #delete-btn { margin-left: 0; }
        }

<body>

<!-- ── LOGIN ─────────────────────────────────────────────────────────── -->
<div id="login-screen">
    <h1>THE TOLUCAN TIMES</h1>
    <p>
        Admin Panel<br><br>
        Go to <a href="https://github.com/settings/tokens" target="_blank">github.com/settings/tokens</a>,
        click <strong>Generate new token (classic)</strong>, check <strong>repo</strong>, and paste it below.
    </p>
    <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    <button class="btn btn-primary" style="width:100%;padding:11px;" onclick="login()">Sign In</button>

</div>

<!-- ── ADMIN ─────────────────────────────────────────────────────────── -->
<div id="admin-screen">
    <div class="admin-header">
        <h1>TOLUCAN TIMES — ADMIN</h1>
        <div class="admin-header-right">
            <a href="./index.html" target="_blank">View Site ↗</a>
            <button class="btn btn-secondary" style="font-size:12px;padding:6px 14px;" onclick="logout()">Sign Out</button>
        </div>
    </div>

    <div class="admin-body">
        <div id="status-msg"></div>

        <!-- List -->
        <div id="list-view">
            <div class="section-title">
                <span>Articles</span>
                <button class="btn btn-primary" onclick="showEditor(-1)">+ New Article</button>
            </div>
            <div id="article-list">
                <p style="font-family:sans-serif;font-size:13px;color:#888;">Loading…</p>
            </div>

            <!-- Ad Settings -->
            <div style="margin-top:36px;">
                <div class="section-title">
                    <span>Advertisement</span>
                    <button class="btn btn-secondary btn-sm" onclick="toggleAdForm()" style="font-size:11px;padding:5px 12px;">Edit Settings</button>
                </div>
                <div id="ad-form-wrap" style="display:none; background:white; border:1px solid #ddd; padding:24px;">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Ad Image URL <span>(JPG, PNG, or https://…)</span></label>
                            <input type="text" id="ad-image-input" placeholder="https://... or ./images/ad.jpg" oninput="updateAdPreview()">

<script>
const REPO  = 'JOO-K/TolucanTimesLA2026';
const API   = 'https://api.github.com/repos/' + REPO + '/contents/';
const DATA  = 'data/articles.json';

let token      = '';
let articles   = [];
let dataSha    = null;
let editingIdx = -1;
let blocks     = []; // working copy of blocks for current edit

// ── Auth ────────────────────────────────────────────────────────────────────

async function login() {
    const val = document.getElementById('token-input').value.trim();
    if (!val) return;
    token = val;
    document.getElementById('login-error').textContent = '';
    showStatus('Verifying…', 'loading');
    try {
        const res = await fetch('https://api.github.com/repos/' + REPO, { headers: headers() });
        if (!res.ok) {
            const j = await res.json().catch(() => ({}));
            throw new Error(j.message || 'Token invalid or missing repo scope.');
        }
        localStorage.setItem('ttt_token', token);
        openAdmin();
    } catch (e) {
        token = '';
        clearStatus();
        document.getElementById('login-error').textContent = e.message;
    }
}

function logout() {
    localStorage.removeItem('ttt_token');
    token = ''; articles = []; dataSha = null;
    document.getElementById('admin-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'block';
    document.getElementById('token-input').value = '';
    clearStatus();
}

async function openAdmin() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    await loadArticles();
    loadAdConfig();
}

// ── GitHub helpers ───────────────────────────────────────────────────────────

function headers() {
    return { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' };
}

async function getFile(path) {
    const res = await fetch(API + path, { headers: headers() });
    if (res.status === 404) return null;
    if (!res.ok) { const j = await res.json().catch(()=>({})); throw new Error(j.message || 'Read failed: ' + path); }
    const data = await res.json();
    data.decoded = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
    return data;
}

async function putFile(path, content, sha, message) {
    const body = { message, content: btoa(unescape(encodeURIComponent(content))) };
    if (sha) body.sha = sha;
    const res = await fetch(API + path, { method: 'PUT', headers: headers(), body: JSON.stringify(body) });
    if (!res.ok) { const j = await res.json().catch(()=>({})); throw new Error(j.message || 'Write failed: ' + path); }
    return res.json();
}

async function deleteFile(path, sha, message) {
    const res = await fetch(API + path, { method: 'DELETE', headers: headers(), body: JSON.stringify({ message, sha }) });
    if (!res.ok) { const j = await res.json().catch(()=>({})); throw new Error(j.message || 'Delete failed: ' + path); }
}

// ── Data ────────────────────────────────────────────────────────────────────

async function loadArticles() {
    showStatus('Loading articles…', 'loading');
    try {
        const file = await getFile(DATA);
        if (file) {
            articles = JSON.parse(file.decoded);
            dataSha  = file.sha;
        } else {
            articles = seedArticles();
            dataSha  = null;
        }
        renderList();
        clearStatus();
    } catch (e) {
        showStatus('Error loading articles: ' + e.message + ' — Try signing out and back in.', 'error');
    }
}

function seedArticles() {
    return [
        {
            id: 'article_01',
            title: 'Dan Carlin, A Hardcore Tolucan',
            author: 'Gino Renzulli',
            tag: 'Interview',
            cardImage: './images/Frontpage_02.png',
            excerpt: 'Dan Carlin, creator of Hardcore History, grew up right here in Toluca Lake — and he had a lot to say about the neighborhood he still calls his foundational place.',
            blocks: [
                { type: 'image', src: 'https://www.dancarlin.com/wp-content/uploads/2024/04/yt-3-1024x576.jpg', caption: 'Dan Carlin' },
                { type: 'text', content: 'Dan Carlin is a name that will be familiar to many of you as the creator of one of the most widely listened to podcasts in America, Hardcore History. A smaller fraction of you, if you have lived in Toluca Lake since the 1970s, may have actually known Dan or the Carlin family personally. It recently came to my attention that Carlin, a man whose work I greatly admire and whose voice I have listened to for over 100 hours, had lived in Toluca Lake and in fact grew up with some of my closest family friends.\n\nUpon learning this, I knew I had to reach out to Carlin, and thankfully, Dan could not have been more receptive. I was thrilled to receive a response, and even more excited that Carlin was eager to talk and fondly remembered our mutual friends. Carlin graciously offered his time for a lengthy and wide-ranging interview over the phone with The Tolucan Times. Carlin was phenomenally kind, open, and a model interviewee, which should come as no surprise considering he has made a living as an eloquent communicator.\n\nCarlin started his career in journalism originally working at KJH-TV, which would later become KCAL. "I got a coffee-getter, intern-runner, gofer type job at channel 9." Right on cue, Dan had a history tidbit to share about channel 9\'s history. "This is how old [KJH-TV\'s] manager was. It was an RKO General station. I think RKO General was a tire company in the Depression, and they bought a bunch of media outlets, and by the time I worked there, they were still hobbling along with something they didn\'t even know why they still owned anymore. I\'m not even sure they still sold tires at that point. And while I was there, it got bought by Disney." Dan\'s story checks out, a tire company called General Tire owned channel 9 in Los Angeles from 1951 until 1989. He continued to work there under Disney for a while. "From there I got a job – I didn\'t want one – but the guys at KABC were pushing me saying: \'You know, you\'ll die at this job if you don\'t keep moving up the ladder.\' They were encouraging me to be a reporter. And I think to just shut them up, I sent out some tapes because nobody was getting hired who were sending out tapes, so I didn\'t think it was much of a risk. I got hired in Eugene, Oregon. So I moved up here, became a TV reporter, and moved over to talk radio."\n\nCarlin\'s career in broadcast journalism clearly served as a foundation for his future career in podcasting, but I wondered too if his upbringing in Toluca Lake, a neighborhood known for its many entertainers, influenced his gravitation towards entertaining others. "It\'s funny because I often think back to Toluca Lake, and I\'ll tell my wife, who\'s from Oregon, stories about [Toluca Lake] and it\'s different now than it was then. When I think of what the parents of all of the kids that I knew did, it was two general areas of employment: Either the entertainment industry – in front of behind the camera – or aerospace." Unsurprisingly, again, Carlin was ready to teach me a bit of history that I didn\'t know, but this time about our neighborhood. "There were a ton of people that worked Lockheed, McDonnell, Douglas, you know, all of those kinds of firms. My next-door neighbor\'s dad was an Air Force colonel who worked for Lockheed, and there were a lot of those guys. That seemed to be like that because Lockheed was huge and it probably was not so huge by your time, but this was the Cold War, you know? I moved to Toluca Lake late 1960s, and it was a huge industry in the Valley."\n\nToday, I doubt many of us think of Toluca Lake as a neighborhood that caters specifically to military contractors, but I\'m sure there are still a few in our midst. Carlin\'s family belonged to the other of the two major industries at the time in the area: entertainment. His mother, Lynn Carlin, was an actress in the 70s and 80s when Dan was growing up. She has over 60 on-screen credits, including a starring role alongside Toluca Lake\'s late, great honorary sheriff (and Dan Carlin\'s first little league coach) Joe Campanella in the 1974 film Terror on the 40th Floor. Carlin has been an undeniable trailblazer in the world of podcasting having first entered the sphere in 2005, long before the podcasting boom with his show Hardcore History that now receives millions of downloads per episode. "When we started in 2005, we started the very month that Apple started supporting podcasts. So we really didn\'t think anybody knew what [podcasting] was going to be. Most of the people doing this were like nerds in their dorm rooms in college just reading stuff into a microphone or whatever. I mean, it was just so eclectic and weird and strange that I don\'t think any of us really grasp what any of this was."\n\nCarlin told me that he has always been fond of his time in Toluca Lake, where he lived for the first twelve years of his life in houses on both Navajo and Rose. "That\'s my foundational place," he said of our neighborhood and went on to share some charming stories from that time in Toluca Lake\'s history. "Did anybody ever mention the candy ladies to you?" Carlin asked me. "There were two – and I always think of them as old women but I thought about it the other day and they probably were my age – but these women were the candy ladies. If you would knock on their door and you were a child, they didn\'t even ask anything they just came to the door with a whole tureen of candy. They would come any hour, day or night and do this. And every kid, of course, in the neighborhood knew about this. It was a landmark."\n\nCarlin remarked too how the times have changed and the thought of sending one\'s kids to the mysterious candy ladies\' house would be almost unthinkable to many parents today. On the topic of the Toluca Lake that he grew up in, Carlin told me a couple of his favorite old spots. "One place that I used to go to that my dad would roll his eyes when I made him go there was called Saint George Smorgasbord. It had like a knightly theme, Knights of the Round Table kind of thing. But it was a smorgasbord, so it had every kind of food you can imagine. It would have been like an upscale version of Golden Corral or something." Another old favorite Carlin mentioned that I\'m sure many readers will recall: The Hot Dog Show, which was a Toluca Lake staple for 62 years before it closed its doors in 2011.\n\nIt was an incredible honor and pleasure to speak with Dan, and I want to leave you all with some of his words about Toluca Lake and what it has meant to him throughout his life. "It\'s so funny that just in my little town here where I live in Eugene, Oregon, it just reminds me of how I felt in Toluca Lake when I was a kid. Just because the big, wide world of Los Angeles really wasn\'t a part of my life, you know? What was a part of my life was from Riverside Drive to Lakeside Golf Course. That little square area that was my whole world, and it was nice. It was green; it was safe, and that\'s kind of how this community where I live right now is. It reminds me a little of how my mom always said I was looking to get back to Toluca Lake ever since we left."' }
            ]
        },
        {
            id: 'article_02',
            title: 'The Honorary Mayor Is In!',
            author: 'Nico Renzulli',
            tag: 'Community',
            cardImage: './images/Frontpage_01.png',
            excerpt: 'Meet the honorary mayor of Toluca Lake and learn about the beloved local tradition that has brought our community together for decades.',
            blocks: [
                { type: 'text', content: 'There are always a handful of names that get thrown around when we talk about the legendary members of our community. A few of them sang songs, and some acted in those fancy Hollywood moving pictures. Yet none of them earned the prestigious title of "Honorary Mayor." That belongs to one man and one man only… Fritz Coleman.\n\nAlthough Fritz is most well known for his nearly 40-year run as the weatherman on Channel 4, his career at NBC may not have ever happened if it wasn\'t for his passion for stand-up comedy. "I came out here in 1980, to pursue a career in stand-up. In 1982, I was working [as a performer] at The Comedy Store. My friend, at the time, who worked at Channel 4, brought his boss and his boss\'s wife to see me do a show on a Friday night," Fritz explained. He continued, "I had talked on stage about doing weather in the Navy, I was in the Navy for 4 years and did armed forces radio and television. I was forced to do the weather against my will."\n\nAlthough Fritz didn\'t know much of anything about the weather, Channel 4 saw him as a perfect fit. Fritz recalled the Channel 4 boss saying "It\'s perfect because there\'s no weather in California, this will work out great." A stand-up background was more than ideal, as he pointed out. "When you\'re doing the weather, no one is helping you out… You would figure out the weather story, makeup four or five bullet points, and conversate the audience through that story." Fritz ended up working at Channel 4 until his retirement in 2020, only 2 weeks shy of his 40th anniversary at NBC.\n\nThrough all his years on air, Fritz continued to do comedy as an outlet to talk about something other than the never-ending supply of vitamin D we get here in Southern California. The Honorary Mayor explained, "I do single-topic monologues, I\'ve been doing it for about 30 years." His first show was called \'It\'s Me, Dad,\' which was about life as a divorced father. His second show, \'The Reception\' covered the topic of being divorced as well. Next came \'Tonight at 11\' which gave insight into his time on the news. The fourth installment of his single topic monologues, \'Defying Gravity,\' was a show about getting older. His current show, which Fritz titled \'Unassisted Living,\' is about getting really old.\n\n"Unassisted Living," which has been playing once a month at The El Portal Theatre, has been extended for a third time. Come October, the show will have been running for a year. For those of you who want to see it, the next performance is Sunday, July 21st at 3 pm. Seeing as how this is The Tolucan Times, I had to do my journalistic duty for our community. I had to know what it really means to be our Honorary Mayor. "I\'ve been the Honorary Mayor for 28 years. I have no political power, I can\'t even get a parking ticket fixed in this town," Fritz quipped. "But I love it. It\'s public relations for this community that I love very much."\n\nHaving been a part of the community for so long, Fritz was truly excited to have The Tolucan Times return this past year. With a lifetime of experience in news and media, he sees the importance of a local news source. He says, "There is a school of thought that news is going to become hyper-local. These papers are going to be more valuable to people\'s lives than something like the LA Times… I think this type of paper is going to be the future." Like many of us, he has a story of his first time seeing the actual Toluca Lake. "At first I thought the lake was just a legend, like the Loch Ness Monster, only rich people could get back there. Then I got a couple of friends, through my acquaintances in Toluca Lake, invited me back there. It\'s a beautiful spot, with these spectacular homes," he shared. When I asked him where in Toluca Lake he eats, he swiftly responded "Breakfast at Bob\'s Big Boy, dinner at Paty\'s." I don\'t think there is a more Toluca Lake response than that. Follow Fritz on Instagram: @RealFritzColeman.' },
                { type: 'image', src: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Media_Path_Podcast_with_Fritz_Coleman_%2852565967701%29_%28cropped%29.jpg/1200px-Media_Path_Podcast_with_Fritz_Coleman_%2852565967701%29_%28cropped%29.jpg', caption: 'Fritz Coleman' }
            ]

            id: 'article_03',
            title: 'L.A. In a Minute: Let\'s Get Into It',
            author: 'Gino Renzulli',

lways love history?\n\nEL: Great question. I did not like history class in school, but I was always interested in historical footnotes, tidbits, and trivia. As a youngster, I was obsessed with sports and could rattle off baseball stats going back to Wee Willie Keeler and Ty Cobb, and through the days of Don Mattingly and Kirby Puckett. My parents also instilled in me a love of L.A., and they would take me around the Venice boardwalk, Griffith Park, South Los Angeles, and Boyle Heights and regale me with their personal histories, which unlocked a greater appreciation for the history of the city as well.\n\nGR: How has your perception of LA changed since starting the show and researching the city?\n\nEL: Oh my gosh. I\'ve always loved Los Angeles and luckily I had a great appreciation of its diversity and rich culture growing up in the San Fernando Valley. In my homeroom in junior high, I had an Egyptian classmate, a Kenyan classmate, Armenian, Korean, Jewish — and even then I knew that this was special. It was so fun going to my friends\' homes and trying their family\'s foods and just seeing things that were different. With that as a foundation, my appreciation of Los Angeles is always viewed through the prism of the richness of culture here in L.A. — despite the fact that people have always said, "L.A. has no history in culture." Well, the truth is, you just need to look for it.\n\nGR: What\'s one piece of LA history every Angeleno should know about?\n\nEL: The Pobladores that founded El Pueblo de Nuestra Señora la Reina de los Ángeles on September 4, 1781, was a reflection of the city today; 44 families, including Mexicans, Spaniards, Indigenous people, Africans, and Filipinos.\n\nGR: Was there anyone doing content like this that inspired you?\n\nEL: I am inspired by the people of L.A. every day. I owe a debt of gratitude to Huell Howser, Art Laboe, Vin Scully, and Jonathan Gold, as their approach to the \'regular\' people, spots, and neighborhoods of Los Angeles were so authentic, deep-rooted, and genuine, that subconsciously I see reflections of their work in what I try to accomplish each day.\n\nGR: How long would you say one video takes to complete from inception to the end of editing?\n\nEL: From research to script to rewriting to driving to filming to editing... about eight hours per video. It\'s definitely a labor of love. My friend compares each video to "doing a term paper" and that sounds about right.\n\nGR: Are you recognized on the streets often?\n\nEL: Honestly, now I am recognized on a daily basis. It\'s really neat to know that I\'m able to make an impact in this city. It\'s not about me. It\'s about uncovering the pride that people have in their neighborhood and culture, and my ability to shine a positive light on this city really resonates.\n\nGR: Finally, what does the future hold for LA in a Minute?\n\nEL: I would like to publish my book, 100 Stories of L.A. In a Minute, and also have the opportunity to turn L.A. in a Minute into a full-length show on a streaming service or a local network. In the meantime, the goal is to continue growing while shining a positive light on all of Los Angeles!' }

hough you\'re in an idyllic New England small town.\n\nFor those not so interested in that particular TV-fare, or perhaps for those who haven\'t been on this tour since their massive update in 2021, a number of interactive exhibits are included in your excursion, namely a large space dedicated to the DC Comics Universe and the Harry Potter franchise.\n\nLast but certainly not least are a pair of dazzling gift shops, one for the Friends fanatics (which includes a free photo-op in the real "Central Perk" set) and the other a WB wide store chock-full of exclusive merchandise.\n\nAs for this writer\'s personal experience of the tour, I can say I had nothing short of a blast! On a sunny day back in May I, along with a friend and fellow TV enthusiast, enjoyed walking the streets of Stars Hollow. We peered around recognizable homes, the cafe from "La La Land" (2017), traveled down "New York Street" up to the "Friends" fountain, walked the halls of a meticulously decorated high school set currently being used for the series "All-American," finishing up at an exhibit where we gazed at Old Hollywood wardrobe, iconic props, screenplays, and coveted award statuettes.\n\nThere is so much Hollywood history surrounding us here in Toluca Lake, whether it\'s the quiet notes of the past alongside our adored tinseltown streets or something as forward and dynamic as this Warner Brothers Tour, what a privilege to be able to be so immersed in it all!' }

// ── List ────────────────────────────────────────────────────────────────────

function renderList() {
    const el = document.getElementById('article-list');
    if (!articles.length) {
        el.innerHTML = '<p style="font-family:sans-serif;font-size:13px;color:#888;">No articles yet. Click "+ New Article" to get started.</p>';
        return;
    }
    el.innerHTML = [...articles].reverse().map((a, ri) => {
        const i = articles.length - 1 - ri;
        return `<div class="article-row">
            <div class="article-row-left">
                <div class="article-row-tag">${a.tag}</div>
                <div class="article-row-title">${a.title}</div>
                <div class="article-row-meta">By ${a.author} &nbsp;·&nbsp; ${a.id}.html</div>
            </div>
            <div class="article-row-actions">
                <a href="./${a.id}.html" target="_blank" class="btn btn-secondary btn-sm" style="text-decoration:none;line-height:1.6">View ↗</a>
                <button class="btn btn-primary btn-sm" onclick="showEditor(${i})">Edit</button>
            </div>
        </div>`;
    }).join('');
}

// ── Blocks ──────────────────────────────────────────────────────────────────

function renderBlocks() {
    const el = document.getElementById('blocks-list');
    if (!blocks.length) {
        el.innerHTML = '<p style="font-family:sans-serif;font-size:12px;color:#aaa;margin-bottom:10px;">No blocks yet — add text or images below.</p>';
        return;
    }
    el.innerHTML = blocks.map((b, i) => {
        const isFirst = i === 0, isLast = i === blocks.length - 1;
        const controls = `
            <button type="button" class="btn btn-secondary btn-sm" onclick="moveBlock(${i},-1)" ${isFirst ? 'disabled' : ''} title="Move up">↑</button>
            <button type="button" class="btn btn-secondary btn-sm" onclick="moveBlock(${i},1)"  ${isLast  ? 'disabled' : ''} title="Move down">↓</button>
            <button type="button" class="btn btn-danger btn-sm"    onclick="removeBlock(${i})"  title="Delete block">✕</button>`;

        if (b.type === 'text') {
            return `<div class="block-item">
                <div class="block-header">
                    <span class="block-type-label">Text Block</span>
                    ${controls}
                </div>
                <div class="block-body">
                    <textarea rows="5" placeholder="Write paragraph text here. Leave a blank line between paragraphs." oninput="blocks[${i}].content=this.value">${escHtml(b.content||'')}</textarea>
                </div>
            </div>`;
        } else {
            return `<div class="block-item">
                <div class="block-header">
                    <span class="block-type-label image">Image Block</span>
                    ${controls}
                </div>
                <div class="block-body">
                    <input type="text" placeholder="Image URL or path — e.g. ./images/photo.png or https://…" value="${escHtml(b.src||'')}" oninput="blocks[${i}].src=this.value">
                    <input type="text" placeholder="Caption (optional)" value="${escHtml(b.caption||'')}" oninput="blocks[${i}].caption=this.value">
                </div>
            </div>`;
        }
    }).join('');
}

function addBlock(type) {
    blocks.push(type === 'text' ? { type:'text', content:'' } : { type:'image', src:'', caption:'' });
    renderBlocks();
    // scroll new block into view
    const items = document.querySelectorAll('.block-item');
    if (items.length) items[items.length-1].scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function removeBlock(i) {
    blocks.splice(i, 1);
    renderBlocks();
}

function moveBlock(i, dir) {
    const j = i + dir;
    if (j < 0 || j >= blocks.length) return;
    [blocks[i], blocks[j]] = [blocks[j], blocks[i]];
    renderBlocks();
}

function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Editor ──────────────────────────────────────────────────────────────────

function showEditor(index) {
    editingIdx = index;
    const form = document.getElementById('article-form');
    form.reset();

    if (index === -1) {
        document.getElementById('editor-heading').textContent = 'New Article';
        document.getElementById('delete-btn').style.display = 'none';
        blocks = [{ type:'text', content:'' }]; // start with one empty text block
    } else {
        const a = articles[index];
        document.getElementById('editor-heading').textContent = 'Editing: ' + a.title;
        form.title.value     = a.title;
        form.author.value    = a.author;
        form.tag.value       = a.tag;
        form.cardImage.value = a.cardImage || '';
        form.excerpt.value   = a.excerpt   || '';
        // Support old "body" string format or new blocks array
        if (a.blocks && a.blocks.length) {
            blocks = JSON.parse(JSON.stringify(a.blocks)); // deep copy
        } else if (a.body) {
            blocks = [{ type:'text', content: a.body.replace(/<br><br>/g,'\n\n').replace(/<br>/g,'\n') }];
        } else {
            blocks = [{ type:'text', content:'' }];
        }
        document.getElementById('delete-btn').style.display = 'inline-block';
    }

    renderBlocks();
    document.getElementById('list-view').style.display      = 'none';
    document.getElementById('article-editor').style.display = 'block';
    window.scrollTo(0, 0);
    clearStatus();
}

function cancelEdit() {
    document.getElementById('article-editor').style.display = 'none';
    document.getElementById('list-view').style.display      = 'block';
    clearStatus();
}

// ── Save ────────────────────────────────────────────────────────────────────

async function saveArticle(e) {
    e.preventDefault();
    const form = document.getElementById('article-form');
    const data = {
        title:     form.title.value.trim(),
        author:    form.author.value.trim(),
        tag:       form.tag.value,
        cardImage: form.cardImage.value.trim(),
        excerpt:   form.excerpt.value.trim(),
        blocks:    blocks.filter(b => b.type === 'image' ? b.src.trim() : b.content.trim())
    };

    if (!data.blocks.length) { showStatus('Add at least one content block before publishing.', 'error'); return; }

    if (editingIdx === -1) {
        const nums = articles.map(a => parseInt(a.id.replace('article_','')) || 0);
        data.id = 'article_' + String((nums.length ? Math.max(...nums) : 0) + 1).padStart(2,'0');
    } else {
        data.id = articles[editingIdx].id;
    }

    showStatus('Publishing…', 'loading');
    try {
        const html      = buildArticleHTML(data);
        const existing  = await getFile(data.id + '.html');
        await putFile(data.id + '.html', html, existing ? existing.sha : null,
            (editingIdx === -1 ? 'Add' : 'Update') + ' article: ' + data.title);

        if (editingIdx === -1) articles.push(data);
        else articles[editingIdx] = data;

        const jr = await putFile(DATA, JSON.stringify(articles, null, 2), dataSha, 'Update articles.json');
        dataSha = jr.content.sha;

        const hpFile = await getFile('html/homepageboxnavComp.html');
        await putFile('html/homepageboxnavComp.html', buildHomepageComp(articles), hpFile ? hpFile.sha : null, 'Refresh homepage');

        renderList();
        cancelEdit();
        showStatus('Published! Changes go live on GitHub Pages in about 1 minute.', 'success');
    } catch (err) {
        showStatus('Error: ' + err.message, 'error');
    }
}

// ── Delete ──────────────────────────────────────────────────────────────────

async function deleteArticle() {
    if (editingIdx === -1) return;
    const a = articles[editingIdx];
    if (!confirm('Delete "' + a.title + '"?\n\nThis cannot be undone.')) return;
    showStatus('Deleting…', 'loading');
    try {
        const file = await getFile(a.id + '.html');
        if (file) await deleteFile(a.id + '.html', file.sha, 'Delete article: ' + a.title);
        articles.splice(editingIdx, 1);
        const jr = await putFile(DATA, JSON.stringify(articles, null, 2), dataSha, 'Update articles.json');
        dataSha = jr.content.sha;
        const hpFile = await getFile('html/homepageboxnavComp.html');
        await putFile('html/homepageboxnavComp.html', buildHomepageComp(articles), hpFile ? hpFile.sha : null, 'Refresh homepage after delete');
        renderList();
        cancelEdit();
        showStatus('Article deleted.', 'success');
    } catch (err) {
        showStatus('Error: ' + err.message, 'error');
    }
}

            return `        <div class="paragraph-container"><p>${html}</p></div>`;
        } else {
            const cap = b.caption ? `\n        <p class="article-img-caption">${b.caption}</p>` : '';
            return `        <div class="article-img-block">\n            <img src="${b.src}" alt="${b.caption || a.title}">${cap}\n        </div>`;
        }
    }).join('\n');

    return `<!DOCTYPE html>
<html lang="en">
<head>
    <title>${a.title} — The Tolucan Times</title>

    <link href="https://fonts.googleapis.com/css2?family=Syne+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div id="nav-ph"></div>
    <div class="article-container">
        <div class="headline-container"><h1>${a.title}</h1></div>
        <div class="subheadline-container"><h2>Written By &nbsp;&nbsp; ${a.author}</h2></div>
${bodyHTML}
    </div>

}

let adConfig    = { image: '', link: '', alt: 'Advertisement' };
let adConfigSha = null;
const AD_CONFIG = 'data/config.json';

async function loadAdConfig() {
    try {
        const file = await getFile(AD_CONFIG);
        if (file) {
            const cfg   = JSON.parse(file.decoded);
            adConfig    = cfg.ad || { image: '', link: '', alt: 'Advertisement' };
            adConfigSha = file.sha;
            const imgEl = document.getElementById('ad-image-input');
            const lnkEl = document.getElementById('ad-link-input');
            const altEl = document.getElementById('ad-alt-input');
            if (imgEl) imgEl.value = adConfig.image || '';
            if (lnkEl) lnkEl.value = adConfig.link  || '';
            if (altEl) altEl.value = adConfig.alt   || '';
            updateAdPreview();
        }
    } catch (e) { /* no config yet — that's fine */ }
}

function toggleAdForm() {
    const wrap = document.getElementById('ad-form-wrap');
    wrap.style.display = wrap.style.display === 'none' ? 'block' : 'none';
}

function updateAdPreview() {
    const imgEl   = document.getElementById('ad-image-input');
    const preview = document.getElementById('ad-preview');
    if (!imgEl || !preview) return;
    preview.innerHTML = imgEl.value.trim()
        ? '<img src="' + imgEl.value.trim() + '" style="max-height:80px;max-width:180px;object-fit:contain;border:1px solid #ddd;">'
        : '';
}

async function saveAdSettings() {
    adConfig = {
        image : (document.getElementById('ad-image-input').value || '').trim(),
        link  : (document.getElementById('ad-link-input').value  || '').trim(),
        alt   : (document.getElementById('ad-alt-input').value   || 'Advertisement').trim()
    };
    showStatus('Saving ad settings…', 'loading');
    try {
        const existing = await getFile(AD_CONFIG);
        const jr = await putFile(AD_CONFIG, JSON.stringify({ ad: adConfig }, null, 2),
            existing ? existing.sha : null, 'Update ad settings');
        adConfigSha = jr.content.sha;
        showStatus('Ad saved! Live on site in ~1 minute.', 'success');
        updateAdPreview();
    } catch (e) {
        showStatus('Error: ' + e.message, 'error');
    }
}

async function clearAd() {
    if (!confirm('Remove the current advertisement?')) return;
    document.getElementById('ad-image-input').value = '';
    document.getElementById('ad-link-input').value  = '';
    await saveAdSettings();
}

// ── Status ───────────────────────────────────────────────────────────────────

function showStatus(msg, type) {
    const el = document.getElementById('status-msg');
    el.textContent = msg; el.className = type; el.style.display = 'block';
}
function clearStatus() { document.getElementById('status-msg').style.display = 'none'; }

// ── Init ─────────────────────────────────────────────────────────────────────

(function init() {
    const saved = localStorage.getItem('ttt_token');
    if (saved) { token = saved; openAdmin(); }
})();
</script>
